<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vittorio Francesco Ardente</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --bg:     #0d1a2e;
      --accent: #4da6ff;
      --glass:  rgba(255,255,255,0.07);
      --border: rgba(100,180,255,0.20);
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* ── PARTICLE BG ── */
    #stars {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* ── HEADER IMAGE — real photo ── */
    .header {
      width: 100%;
      height: 200px;
      position: relative;
      flex-shrink: 0;
      box-shadow: 0 3px 0 0 rgba(77,166,255,0.55), 0 6px 20px rgba(30,100,255,0.15);
      overflow: hidden;
    }
    .header-bg {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 40%;
      display: block;
    }
    /* Dark overlay to harmonize with navy palette */
    .header-tint {
      position: absolute; inset: 0;
      background: linear-gradient(
        180deg,
        rgba(2,8,20,0.30) 0%,
        rgba(5,15,35,0.20) 50%,
        rgba(8,20,45,0.55) 100%
      );
    }


    /* ── CONTENT AREA ── */
    .wrapper {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center;
      width: 100%; max-width: 480px;
      padding: 0 28px 56px;
    }

    /* ── AVATAR overlapping the header edge (LinkedIn style) ── */
    .avatar-wrap {
      margin-top: -72px;
      z-index: 20;
      position: relative;
      align-self: center;
      margin-left: 0;
    }
    .avatar-circle {
      width: 148px; height: 148px;
      border-radius: 50%;
      overflow: hidden;
      border: 4px solid var(--bg);
      box-shadow:
        0 0 0 2px var(--accent),
        0 12px 40px rgba(5,20,60,0.65);
    }
    .avatar-circle img {
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 18%;
      display: block;
    }

    /* ── NAME & ROLE (left-aligned like LinkedIn) ── */
    .identity {
      width: 100%;
      padding: 10px 0 0 0;
      text-align: center;
    }
    .name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 26px; font-weight: 700;
      color: #fff; letter-spacing: 0.2px;
      text-align: center;
    }
    .role {
      margin-top: 3px;
      font-size: 10px; font-weight: 500;
      letter-spacing: 4px; text-transform: uppercase;
      color: rgba(120,195,255,0.58);
    }

    /* ── DIVIDER ── */
    .divider {
      width: 100%; height: 1px; margin: 22px 0 0;
      background: linear-gradient(90deg, transparent, rgba(77,166,255,0.25), transparent);
    }

    /* ── SOCIALS (centered) ── */
    .socials {
      display: flex; gap: 14px; margin-top: 22px;
      align-self: center;
    }
    .socials a {
      display: flex; align-items: center; justify-content: center;
      width: 46px; height: 46px; border-radius: 50%;
      background: var(--glass); border: 1px solid var(--border);
      text-decoration: none;
      transition: all 0.24s cubic-bezier(.34,1.56,.64,1);
    }
    .socials a:hover {
      background: rgba(77,166,255,0.18);
      border-color: rgba(77,166,255,0.50);
      transform: translateY(-3px) scale(1.1);
      box-shadow: 0 10px 28px rgba(10,50,150,0.45);
    }
    .socials svg { width:19px; height:19px; fill:rgba(160,215,255,0.85); transition:fill 0.2s; }
    .socials a:hover svg { fill:#fff; }

    /* ── BUTTONS ── */
    .links {
      width: 100%; display: flex; flex-direction: column;
      gap: 12px; margin-top: 18px;
    }
    .btn {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 22px; border-radius: 14px;
      text-decoration: none; font-size: 13.5px; font-weight: 500;
      color: rgba(200,230,255,0.90);
      background: var(--glass); border: 1px solid var(--border);
      transition: all 0.22s cubic-bezier(.34,1.56,.64,1);
      position: relative; overflow: hidden;
    }
    .btn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(90deg, rgba(77,166,255,0.09) 0%, transparent 65%);
      opacity: 0; transition: opacity 0.22s;
    }
    .btn:hover {
      background: rgba(77,166,255,0.12);
      border-color: rgba(77,166,255,0.38);
      transform: translateY(-2px);
      box-shadow: 0 10px 30px rgba(5,20,70,0.50);
      color: #fff;
    }
    .btn:hover::after { opacity: 1; }
    .btn svg { width:18px; height:18px; fill:rgba(120,195,255,0.80); flex-shrink:0; transition:fill 0.2s; position:relative; z-index:1; }
    .btn:hover svg { fill:var(--accent); }
    .btn-label { flex:1; position:relative; z-index:1; }
    .btn-arrow { font-size:13px; color:rgba(77,166,255,0.40); transition:transform 0.2s,color 0.2s; position:relative; z-index:1; }
    .btn:hover .btn-arrow { transform:translateX(4px); color:rgba(77,166,255,0.75); }

    .footer {
      margin-top: 40px; font-size: 10px; letter-spacing: 2.5px;
      color: rgba(77,140,220,0.22); text-transform: uppercase; text-align: center;
    }

    .wrapper > * { animation: fadeUp 0.55s cubic-bezier(.22,1,.36,1) both; }
    .avatar-wrap { animation-delay: 0.08s; }
    .identity    { animation-delay: 0.14s; }
    .divider     { animation-delay: 0.18s; }
    .socials     { animation-delay: 0.24s; }
    .links       { animation-delay: 0.32s; }
    .footer      { animation-delay: 0.44s; }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(14px); }
      to   { opacity:1; transform:translateY(0); }
    }
  </style>
</head>

<script>


// ── FLOATING PARTICLES ────────────────────────────────────────────────────
(function() {
  const c = document.getElementById('stars');
  const ctx = c.getContext('2d');
  let W, H, pts = [];
  function resize() { W = c.width = window.innerWidth; H = c.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  for (let i = 0; i < 100; i++) pts.push({
    x: Math.random(), y: Math.random(),
    vx: (Math.random()-0.5)*0.00009, vy: -Math.random()*0.00014-0.00002,
    r: Math.random()*1.8+0.4, a: Math.random()*0.22+0.05,
    p: Math.random()*Math.PI*2, ps: Math.random()*0.016+0.007
  });
  function draw() {
    ctx.clearRect(0,0,W,H);
    pts.forEach(p => {
      p.x+=p.vx; p.y+=p.vy; p.p+=p.ps;
      if(p.y<-0.02) p.y=1.02;
      if(p.x<-0.02) p.x=1.02;
      if(p.x>1.02)  p.x=-0.02;
      const a = p.a*(0.5+0.5*Math.sin(p.p));
      ctx.beginPath(); ctx.arc(p.x*W,p.y*H,p.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(100,185,255,${a})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
})();
</script>
